<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KAIRO RESTORE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
html,body{height:100%;overscroll-behavior:none}
body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;-webkit-font-smoothing:antialiased}
.space-pan #svg{cursor:grab!important}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
button,select,input{outline:none}
.glass{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
@media print{body{background:white!important}header{display:none!important}#svg{background:white!important}#bg rect{fill:white!important}}
</style>
</head>
<body class="bg-[#020617] text-slate-100 select-none">
<div class="h-dvh w-screen flex flex-col bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0b1220] to-slate-950">
<header class="relative z-40 border-b border-slate-800/80 bg-slate-900/70 glass">
<div class="w-full px-2 sm:px-3 py-2">
<div class="flex flex-wrap items-center gap-2 sm:gap-2.5">
<div class="flex items-center gap-2 mr-1">
<div class="w-2.5 h-2.5 rounded-full bg-sky-400 animate-pulse"></div>
<h1 class="font-black tracking-[0.18em] text-[15px] sm:text-[17px] text-transparent bg-clip-text bg-gradient-to-r from-sky-400 via-cyan-300 to-teal-300">KAIRO RESTORE</h1>
</div>
<div class="flex items-center gap-1.5 pl-2 sm:border-l sm:border-slate-800">
<div class="flex items-center gap-1 bg-slate-800/60 rounded-lg border border-slate-700/60 px-2 py-1">
<label class="text-[11px] text-slate-400">電圧</label>
<select id="voltage" class="bg-transparent text-sm"><option class="bg-slate-800">100V</option><option class="bg-slate-800">200V</option></select>
</div>
<div class="flex items-center gap-1 bg-slate-800/60 rounded-lg border border-slate-700/60 px-2 py-1">
<label class="text-[11px] text-slate-400">回路</label>
<select id="circuit" class="bg-transparent text-sm w-14"></select>
</div>
</div>
<div class="flex items-center gap-1.5">
<div class="flex items-center gap-1 bg-slate-800/40 rounded-lg border border-slate-700/50 px-1.5 py-1">
<label class="text-[11px] text-slate-400">線</label>
<select id="lineColor" class="bg-transparent text-xs">
    <option class="bg-slate-800" value="#000000">黒</option>
    <option class="bg-slate-800" value="#ef4444">赤</option>
    <option class="bg-slate-800" value="#3b82f6">青</option>
    <option class="bg-slate-800" value="#22c55e">緑</option>
    <option class="bg-slate-800" value="#eab308">黄</option>
    <option class="bg-slate-800" value="#a855f7">紫</option>
    <option class="bg-slate-800" value="#f97316">橙</option>
    <option class="bg-slate-800" value="#06b6d4">水</option>
    <option class="bg-slate-800" value="#6b7280">灰</option>
    <option class="bg-slate-800" value="#92400e">茶</option>
</select>
</div>
<div class="flex items-center gap-1 bg-slate-800/40 rounded-lg border border-slate-700/50 px-1.5 py-1">
<label class="text-[11px] text-slate-400">番</label>
<select id="labelColor" class="bg-transparent text-xs">
    <option class="bg-slate-800" value="#000000">黒</option>
    <option class="bg-slate-800" value="#ef4444">赤</option>
    <option class="bg-slate-800" value="#3b82f6">青</option>
    <option class="bg-slate-800" value="#22c55e">緑</option>
    <option class="bg-slate-800" value="#eab308">黄</option>
    <option class="bg-slate-800" value="#a855f7">紫</option>
    <option class="bg-slate-800" value="#f97316">橙</option>
    <option class="bg-slate-800" value="#06b6d4">水</option>
    <option class="bg-slate-800" value="#6b7280">灰</option>
    <option class="bg-slate-800" value="#92400e">茶</option>
</select>
</div>
</div>
<div class="hidden sm:block h-6 w-px bg-slate-800 mx-1"></div>
<div class="flex items-center gap-1 overflow-x-auto">
<button data-mode="point" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">点</button>
<button data-mode="junction" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">ジョイント</button>
<button data-mode="label" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">回路番号</button>
<button data-mode="bend" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">曲げ</button>
<button data-mode="move" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">移動</button>
<button data-mode="eraser" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">消しゴム</button>
<button data-mode="eyedropper" class="mode-btn px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">スポイト</button>
</div>
<div class="flex items-center gap-2 bg-slate-900/60 border border-slate-800 rounded-xl px-2.5 py-1">
<div class="flex items-center gap-1"><label class="text-[10px] text-slate-500">J</label><input id="jointSize" type="range" min="4" max="20" value="8" class="w-14 accent-sky-500"></div>
<div class="flex items-center gap-1"><label class="text-[10px] text-slate-500">番</label><input id="labelSize" type="range" min="6" max="24" value="10" class="w-14 accent-sky-500"></div>
<div class="flex items-center gap-1"><label class="text-[10px] text-slate-500">消</label><input id="eraserSize" type="range" min="8" max="80" value="28" class="w-14 accent-red-500"></div>
<div class="flex items-center gap-1.5 pl-1 border-l border-slate-800"><div id="eraserPreview" class="w-4 h-4 rounded-full border border-slate-600" style="background:#ffffff"></div><span id="eraserHex" class="text-[10px] text-slate-400 font-mono w-11">#ffffff</span></div>
</div>
<div class="flex items-center gap-1 ml-auto">
<button id="undo" class="px-2.5 py-1.5 text-[13px] rounded-lg bg-slate-800/80 border border-slate-700">戻る</button>
<button id="redo" class="px-2.5 py-1.5 text-[13px] rounded-lg bg-slate-800/80 border border-slate-700">進む</button>
<button id="clear" class="px-2.5 py-1.5 text-[13px] rounded-lg bg-red-950/60 border border-red-900/70 text-red-300">全消し</button>
<button id="deleteSelected" class="px-2.5 py-1.5 text-[13px] rounded-lg border border-slate-700 bg-slate-800/80">選択削除</button>
<label class="hidden sm:flex items-center gap-1 text-[11px] text-slate-400 ml-1"><input type="checkbox" id="confirmDelete" checked class="accent-sky-500">確認</label>
<button id="print" class="px-3 py-1.5 text-[13px] font-medium rounded-lg bg-slate-200 border border-slate-300 text-slate-900">印刷</button>
<button id="share" class="px-3 py-1.5 text-[13px] font-medium rounded-lg bg-sky-600 border border-sky-500 text-white">保存</button>
</div>
<div class="w-full sm:w-auto sm:ml-2"><input type="file" id="file" accept="image/*,application/pdf" class="w-full text-[11px] text-slate-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-slate-800 file:text-slate-200"></div>
</div></div></header>
<main class="flex-1 relative overflow-hidden">
<svg id="svg" class="absolute inset-0 w-full h-full bg-[#0f172a] touch-none">
<defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 H0 V20" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f97316" flood-opacity="0.8"/></filter></defs>
<g id="bg"><rect x="-50000" y="-50000" width="100000" height="100000" fill="url(#grid)"/></g>
<g id="lines"></g><g id="nodes"></g><g id="eraseLayer"></g>
</svg>
<div class="pointer-events-none absolute bottom-3 left-3 flex items-center gap-2 text-[10px] text-slate-500"><span class="px-2 py-1 rounded-md bg-slate-900/70 border border-slate-800">Space + ドラッグでパン</span><span class="px-2 py-1 rounded-md bg-slate-900/70 border border-slate-800 hidden sm:block">ホイールでズーム</span></div>
</main></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const svg=document.getElementById('svg'),linesLayer=document.getElementById('lines'),nodesLayer=document.getElementById('nodes'),eraseLayer=document.getElementById('eraseLayer'),bgLayer=document.getElementById('bg');
let nodes=[],edges=[],mode='point',nextId=1,dragging=null,bending=null,panning=false,spacePan=false,scale=1,offsetX=0,offsetY=0,panStart={x:0,y:0},history=[],historyIndex=-1;
let jointSize=8,labelSize=10,eraserSize=28,erasing=false,eraserPoints=[],eraserPoly=null,eraseStrokes=[],currentLineColor='#000000',currentLabelColor='#000000',deletedEdges=new Set(),eraserColor='#ffffff';
const BG_COLOR='#ffffff';
const edgeKey=(a,b)=>[a,b].sort((x,y)=>x-y).join('-');

function serialize(){return{nodes:nodes.map(n=>({...n})),edges:edges.map(e=>({a:e.a.id,b:e.b.id,bends:[...e.bends],color:e.color})),eraseStrokes:JSON.parse(JSON.stringify(eraseStrokes)),deleted:[...deletedEdges]};}
function save(){const snap=serialize();if(historyIndex>=0&&JSON.stringify(history[historyIndex])===JSON.stringify(snap))return;history=history.slice(0,historyIndex+1);history.push(snap);historyIndex++;}
function restore(s){nodes=s.nodes.map(n=>({...n}));const m=new Map(nodes.map(n=>[n.id,n]));edges=s.edges.map(e=>({a:m.get(e.a),b:m.get(e.b),bends:[...(e.bends||[])],color:e.color||'#000000'}));eraseStrokes=s.eraseStrokes||[];deletedEdges=new Set(s.deleted||[]);nextId=Math.max(0,...nodes.map(n=>n.id))+1;draw();redrawErase();}
function undo(){if(historyIndex>0){historyIndex--;restore(history[historyIndex]);}}
function redo(){if(historyIndex<history.length-1){historyIndex++;restore(history[historyIndex]);}}
document.getElementById('undo').onclick=undo;
document.getElementById('redo').onclick=redo;
document.getElementById('clear').onclick=()=>{if(confirm('全て削除しますか？')){nodes=[];edges=[];eraseStrokes=[];deletedEdges.clear();eraseLayer.innerHTML='';draw();save();}};

document.getElementById('deleteSelected').onclick=()=>{
  const confirmMode=document.getElementById('confirmDelete').checked;
  const selectedNodes=nodes.filter(n=>n.selected);
  const selectedEdges=edges.filter(e=>e.selected);
  if(selectedNodes.length===0&&selectedEdges.length===0){alert('選択されていません');return;}
  if(confirmMode){
    const msg='選択削除しますか？\nノード:'+selectedNodes.length+' / 線:'+selectedEdges.length;
    if(!confirm(msg))return;
  }
  const selectedIds=new Set(selectedNodes.map(n=>n.id));
  selectedEdges.forEach(e=>{if(e.a&&e.b)deletedEdges.add(edgeKey(e.a.id,e.b.id));});
  edges.filter(e=>e.a&&e.b&&(selectedIds.has(e.a.id)||selectedIds.has(e.b.id))).forEach(e=>{deletedEdges.add(edgeKey(e.a.id,e.b.id));});
  nodes=nodes.filter(n=>!n.selected);
  edges=edges.filter(e=>e.a&&e.b&&!(selectedIds.has(e.a.id)||selectedIds.has(e.b.id)||e.selected));
  nodes.forEach(n=>n.selected=false);edges.forEach(e=>e.selected=false);
  rebuild();draw();save();
};

const circuitSel=document.getElementById('circuit');
for(let i=1;i<=30;i++){const o=document.createElement('option');o.value=i;o.textContent=i;o.className='bg-slate-800';circuitSel.appendChild(o);}
circuitSel.value='1';

function setMode(m){mode=m;document.querySelectorAll('[data-mode]').forEach(b=>{const a=b.dataset.mode===m;b.classList.toggle('bg-sky-600',a);b.classList.toggle('text-white',a);b.classList.toggle('border-sky-500',a);b.classList.toggle('bg-slate-800/80',!a);});}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));setMode('point');

function getP(e){const ctm=svg.getScreenCTM();if(!ctm)return{x:0,y:0};const p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;return p.matrixTransform(ctm.inverse());}
function getM(e){const p=getP(e);return{x:(p.x-offsetX)/scale,y:(p.y-offsetY)/scale};}
const snap=v=>Math.round(v/10)*10;
function dist(p,v,w){const l2=(v.x-w.x)**2+(v.y-w.y)**2;if(l2===0)return Math.hypot(p.x-v.x,p.y-v.y);let t=((p.x-v.x)*(w.x-v.x)+(p.y-v.y)*(w.y-v.y))/l2;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(v.x+t*(w.x-v.x)),p.y-(v.y+t*(w.y-v.y)));}

function rebuild(){const old=[...edges];edges=[];const g={};nodes.forEach(n=>{const k=n.voltage+'-'+n.circuit;if(!g[k])g[k]={pts:[],jns:[],lbs:[]};if(n.type==='point')g[k].pts.push(n);else if(n.type==='junction')g[k].jns.push(n);else g[k].lbs.push(n);});Object.values(g).forEach(gr=>{const pts=gr.pts.sort((a,b)=>a.x-b.x||a.y-b.y),jns=gr.jns.sort((a,b)=>a.x-b.x||a.y-b.y),lbs=gr.lbs.sort((a,b)=>a.x-b.x||a.y-b.y);const addEdge=(a,b)=>{const key=edgeKey(a.id,b.id);if(!deletedEdges.has(key)){const oe=old.find(o=>(o.a.id===a.id&&o.b.id===b.id)||(o.a.id===b.id&&o.b.id===a.id));edges.push({a,b,bends:oe?[...oe.bends]:[],color:oe?.color||currentLineColor});}};if(pts.length>=1&&lbs.length>=1&&jns.length===0){lbs.forEach(lb=>{pts.forEach(p=>addEdge(p,lb));});return;}pts.forEach((p,i)=>{const j=jns.length?jns[i%jns.length]:null;if(j)addEdge(p,j);});for(let i=0;i<jns.length-1;i++)addEdge(jns[i],jns[i+1]);if(lbs.length&&jns.length){lbs.forEach(lb=>addEdge(lb,jns[0]));}});draw();}

function updateDeleteButton(){const b=document.getElementById('deleteSelected');const s=nodes.some(n=>n.selected)||edges.some(e=>e.selected);b.style.background=s?'#0284c7':'';b.style.color=s?'white':'';}

function draw(){linesLayer.innerHTML='';nodesLayer.innerHTML='';updateDeleteButton();edges.forEach(ed=>{const pts=[ed.a,...ed.bends,ed.b];for(let i=0;i<pts.length-1;i++){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',pts[i].x);l.setAttribute('y1',pts[i].y);l.setAttribute('x2',pts[i+1].x);l.setAttribute('y2',pts[i+1].y);l.setAttribute('stroke',ed.selected?'#f97316':(ed.color||'#000000'));l.setAttribute('stroke-width',ed.selected?'4':'2.3');l.setAttribute('stroke-linecap','round');l.style.cursor='pointer';l.addEventListener('click',e=>{e.stopPropagation();ed.selected=!ed.selected;draw();});l.addEventListener('contextmenu',e=>{e.preventDefault();deletedEdges.add(edgeKey(ed.a.id,ed.b.id));edges=edges.filter(ee=>ee!==ed);rebuild();draw();save();});linesLayer.appendChild(l);}if(bending?.edge===ed&&bending.temp){const last=ed.bends.length?ed.bends[ed.bends.length-1]:ed.a;const t=document.createElementNS('http://www.w3.org/2000/svg','line');t.setAttribute('x1',last.x);t.setAttribute('y1',last.y);t.setAttribute('x2',bending.temp.x);t.setAttribute('y2',bending.temp.y);t.setAttribute('stroke',ed.color||'#000');t.setAttribute('stroke-width','2');t.setAttribute('stroke-dasharray','4 4');t.setAttribute('opacity','0.7');linesLayer.appendChild(t);}});nodes.forEach(n=>{const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('transform','translate('+n.x+','+n.y+')');g.style.cursor=mode==='move'?'move':'pointer';if(n.selected)g.setAttribute('filter','url(#glow)');if(n.type==='point'){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r','3.5');c.setAttribute('fill','#ef4444');c.setAttribute('stroke',n.selected?'#f97316':'#0f172a');c.setAttribute('stroke-width',n.selected?'3':'1.5');g.appendChild(c);}else if(n.type==='junction'){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r',jointSize);c.setAttribute('fill','white');c.setAttribute('stroke',n.selected?'#f97316':'#0f172a');c.setAttribute('stroke-width',n.selected?'3.5':'2');g.appendChild(c);for(let i=-1;i<=1;i++){const l=document.createElementNS('http://www.w3.org/2000/svg','line');const y=i*jointSize*0.34;l.setAttribute('x1',-jointSize*0.65);l.setAttribute('y1',y);l.setAttribute('x2',jointSize*0.65);l.setAttribute('y2',y);l.setAttribute('stroke','#0f172a');l.setAttribute('stroke-width','1.3');l.setAttribute('transform','rotate(-45)');g.appendChild(l);}}else{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r',labelSize+1);c.setAttribute('fill','white');c.setAttribute('stroke',n.selected?'#f97316':'#0f172a');c.setAttribute('stroke-width',n.selected?'3':'1.8');g.appendChild(c);if(n.voltage==='200V'){const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');c2.setAttribute('r',(labelSize+1)*0.6);c2.setAttribute('fill','none');c2.setAttribute('stroke',n.selected?'#f97316':'#000000');c2.setAttribute('stroke-width','1.5');g.appendChild(c2);}const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');t.setAttribute('font-size',Math.round(labelSize*0.95));t.setAttribute('font-weight','800');t.setAttribute('fill',n.color||'#000000');t.textContent=n.circuit;g.appendChild(t);}g.addEventListener('mousedown',e=>{e.stopPropagation();if(mode==='move')dragging=n;});g.addEventListener('click',e=>{e.stopPropagation();n.selected=!n.selected;draw();});g.addEventListener('contextmenu',e=>{e.preventDefault();const id=n.id;nodes=nodes.filter(nn=>nn.id!==id);edges.filter(ed=>ed.a.id===id||ed.b.id===id).forEach(ed=>{deletedEdges.add(edgeKey(ed.a.id,ed.b.id));});rebuild();draw();save();});nodesLayer.appendChild(g);});update();}
function update(){const t='translate('+offsetX+','+offsetY+') scale('+scale+')';['bg','lines','nodes','eraseLayer'].forEach(id=>document.getElementById(id).setAttribute('transform',t));}
function redrawErase(){eraseLayer.innerHTML='';eraseStrokes.forEach(s=>{const p=document.createElementNS('http://www.w3.org/2000/svg','polyline');p.setAttribute('points',s.pts.map(pt=>pt.x+','+pt.y).join(' '));p.setAttribute('fill','none');p.setAttribute('stroke',s.color||BG_COLOR);p.setAttribute('stroke-width',s.size);p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');eraseLayer.appendChild(p);});}

svg.addEventListener('mousedown',e=>{if(e.button===1||(e.button===0&&spacePan)){panning=true;panStart={x:e.clientX-offsetX,y:e.clientY-offsetY};svg.style.cursor='grabbing';return;}const m=getM(e),x=snap(m.x),y=snap(m.y),v=document.getElementById('voltage').value,c=document.getElementById('circuit').value;if(mode==='eyedropper'){let picked='#ffffff',dmin=15;nodes.forEach(n=>{const d=Math.hypot(m.x-n.x,m.y-n.y);if(d<dmin){dmin=d;picked=n.color||'#000000';}});edges.forEach(ed=>{const pts=[ed.a,...ed.bends,ed.b];for(let i=0;i<pts.length-1;i++)if(dist(m,pts[i],pts[i+1])<8){picked=ed.color||'#000000';break;}});eraserColor=picked;document.getElementById('eraserPreview').style.background=picked;document.getElementById('eraserHex').textContent=picked;return;}if(mode==='point'||mode==='junction'||mode==='label'){nodes.push({id:nextId++,type:mode==='point'?'point':mode==='junction'?'junction':'label',x,y,voltage:v,circuit:c,color:mode==='label'?currentLabelColor:currentLineColor,selected:false});rebuild();save();}else if(mode==='bend'){let b=null,d=18;edges.forEach(ed=>{const pts=[ed.a,...ed.bends,ed.b];for(let i=0;i<pts.length-1;i++){const di=dist(m,pts[i],pts[i+1]);if(di<d){d=di;b=ed;}}});if(b)bending={edge:b,temp:{x,y}};}else if(mode==='eraser'){erasing=true;eraserPoints=[{x:m.x,y:m.y}];eraserPoly=document.createElementNS('http://www.w3.org/2000/svg','polyline');eraserPoly.setAttribute('fill','none');eraserPoly.setAttribute('stroke',eraserColor);eraserPoly.setAttribute('stroke-width',eraserSize);eraserPoly.setAttribute('stroke-linecap','round');eraserPoly.setAttribute('stroke-linejoin','round');eraseLayer.appendChild(eraserPoly);eraserPoly.setAttribute('points',m.x+','+m.y);}});
svg.addEventListener('mousemove',e=>{if(panning){offsetX=e.clientX-panStart.x;offsetY=e.clientY-panStart.y;update();return;}if(dragging){const m=getM(e);dragging.x=snap(m.x);dragging.y=snap(m.y);rebuild();return;}if(bending){const m=getM(e);bending.temp={x:snap(m.x),y:snap(m.y)};draw();}if(erasing){const m=getM(e);eraserPoints.push({x:m.x,y:m.y});if(eraserPoly)eraserPoly.setAttribute('points',eraserPoints.map(p=>p.x+','+p.y).join(' '));}});
window.addEventListener('mouseup',()=>{if(panning){panning=false;svg.style.cursor='default';}if(dragging){dragging=null;save();}if(bending){bending.edge.bends.push({...bending.temp});bending=null;draw();save();}if(erasing){erasing=false;eraseStrokes.push({pts:[...eraserPoints],size:eraserSize,color:eraserColor});redrawErase();eraserPoly=null;eraserPoints=[];save();}});
svg.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1,mp=getP(e),wx=(mp.x-offsetX)/scale,wy=(mp.y-offsetY)/scale;scale=Math.min(Math.max(0.2,scale*d),4);offsetX=mp.x-wx*scale;offsetY=mp.y-wy*scale;update();},{passive:false});
svg.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('keydown',e=>{if(e.code==='Space'&&!spacePan){spacePan=true;document.body.classList.add('space-pan');e.preventDefault();}if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();}});
window.addEventListener('keyup',e=>{if(e.code==='Space'){spacePan=false;document.body.classList.remove('space-pan');}});

document.getElementById('jointSize').oninput=e=>{jointSize=+e.target.value;draw();};
document.getElementById('labelSize').oninput=e=>{labelSize=+e.target.value;draw();};
document.getElementById('eraserSize').oninput=e=>{eraserSize=+e.target.value;};
document.getElementById('lineColor').onchange=e=>{currentLineColor=e.target.value;};
document.getElementById('labelColor').onchange=e=>{currentLabelColor=e.target.value;};

async function exportToPDF(){
    const {jsPDF}=window.jspdf;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    
    const bgImgs=bgLayer.querySelectorAll('image');
    if(bgImgs.length){
        bgImgs.forEach(img=>{
            const x=parseFloat(img.getAttribute('x')||0);
            const y=parseFloat(img.getAttribute('y')||0);
            const w=parseFloat(img.getAttribute('width')||0);
            const h=parseFloat(img.getAttribute('height')||0);
            minX=Math.min(minX,x);minY=Math.min(minY,y);
            maxX=Math.max(maxX,x+w);maxY=Math.max(maxY,y+h);
        });
    }else{
        nodes.forEach(n=>{
            minX=Math.min(minX,n.x-20);minY=Math.min(minY,n.y-20);
            maxX=Math.max(maxX,n.x+20);maxY=Math.max(maxY,n.y+20);
        });
        edges.forEach(e=>{
            [e.a,...e.bends,e.b].forEach(p=>{
                minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);
                maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);
            });
        });
    }
    
    if(!isFinite(minX)){minX=0;minY=0;maxX=800;maxY=600;}
    const pad=40;minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
    const w=maxX-minX,h=maxY-minY;

    const c=document.createElement('canvas');
    c.width=w;c.height=h;
    const ctx=c.getContext('2d');
    ctx.fillStyle='white';
    ctx.fillRect(0,0,w,h);

    if(bgImgs.length){
        for(let i=0;i<bgImgs.length;i++){
            const imgEl=bgImgs[i];
            const href=imgEl.getAttribute('href');
            const op=parseFloat(imgEl.getAttribute('opacity')||'1');
            const x=parseFloat(imgEl.getAttribute('x')||0)-minX;
            const y=parseFloat(imgEl.getAttribute('y')||0)-minY;
            const iw=parseFloat(imgEl.getAttribute('width')||0);
            const ih=parseFloat(imgEl.getAttribute('height')||0);
            
            await new Promise(res=>{
                const img=new Image();
                img.onload=()=>{
                    ctx.globalAlpha=op;
                    ctx.drawImage(img,x,y,iw,ih);
                    ctx.globalAlpha=1.0;
                    res();
                };
                img.onerror=res;
                img.src=href;
            });
        }
    }

    const clone=svg.cloneNode(true);
    
    const nodesLayerClone = clone.querySelector('#nodes');
    if (nodesLayerClone) {
        const nodeGroups = Array.from(nodesLayerClone.querySelectorAll('g'));
        nodeGroups.forEach(g => {
            if (g.querySelector('circle[fill="#ef4444"]')) {
                g.remove();
            }
        });
    }

    ['bg','lines','nodes','eraseLayer'].forEach(id=>{
        const g=clone.querySelector('#'+id);
        if(g)g.removeAttribute('transform');
    });
    
    const cloneBgImgs=clone.querySelectorAll('#bg image');
    cloneBgImgs.forEach(img=>img.remove());
    
    const bgRect=clone.querySelector('#bg rect');
    if(bgRect)bgRect.setAttribute('fill','none');

    clone.setAttribute('viewBox',`${minX} ${minY} ${w} ${h}`);
    clone.setAttribute('width',w);
    clone.setAttribute('height',h);

    const svgData=new XMLSerializer().serializeToString(clone);
    const svgBlob=new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(svgBlob);

    return new Promise((res,rej)=>{
        const svgImg=new Image();
        svgImg.onload=()=>{
            ctx.drawImage(svgImg,0,0,w,h);
            URL.revokeObjectURL(url);
            try{
                const pdf=new jsPDF({orientation:w>h?'landscape':'portrait',unit:'px',format:[w,h]});
                pdf.addImage(c.toDataURL('image/jpeg', 0.95),'JPEG',0,0,w,h);
                res(pdf);
            }catch(err){
                rej(err);
            }
        };
        svgImg.onerror=(e)=>{
            URL.revokeObjectURL(url);
            rej(new Error('SVGの描画に失敗しました'));
        };
        svgImg.src=url;
    });
}

document.getElementById('print').onclick=async()=>{
    const btn = document.getElementById('print');
    const originalText = btn.textContent;
    
    const printWindow = window.open('about:blank', '_blank');
    if(!printWindow){
        alert('ポップアップがブロックされました。ブラウザの設定で許可してください。');
        return;
    }
    
    printWindow.document.write('<div style="font-family:sans-serif;padding:20px;">印刷データの準備中... しばらくお待ちください。</div>');
    btn.disabled = true;
    btn.textContent = '準備中...';
    
    try {
        const pdf = await exportToPDF();
        printWindow.location.href = pdf.output('bloburl');
    } catch(e) {
        console.error(e);
        printWindow.close();
        alert('印刷の準備に失敗しました: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
};

document.getElementById('share').onclick=async()=>{
    const btn = document.getElementById('share');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '保存中...';
    
    try {
        const pdf = await exportToPDF();
        pdf.save('kairo_restore.pdf');
    } catch(e) {
        console.error(e);
        alert('保存失敗: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
};

document.getElementById('file').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  bgLayer.innerHTML='';
  const grid=document.createElementNS('http://www.w3.org/2000/svg','rect');
  grid.setAttribute('x','-50000');grid.setAttribute('y','-50000');grid.setAttribute('width','100000');grid.setAttribute('height','100000');grid.setAttribute('fill','url(#grid)');bgLayer.appendChild(grid);
  try{
    if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){
      const buf=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;const page=await pdf.getPage(1);const vp=page.getViewport({scale:1.5});const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;const img=document.createElementNS('http://www.w3.org/2000/svg','image');img.setAttribute('href',c.toDataURL());img.setAttribute('x',0);img.setAttribute('y',0);img.setAttribute('width',vp.width);img.setAttribute('height',vp.height);img.setAttribute('opacity','0.9');bgLayer.appendChild(img);
    }else{
      const reader=new FileReader();
      reader.onload=ev=>{const data=ev.target.result;const im=new Image();im.onload=()=>{const img=document.createElementNS('http://www.w3.org/2000/svg','image');img.setAttribute('href',data);img.setAttribute('x',0);img.setAttribute('y',0);img.setAttribute('width',im.naturalWidth);img.setAttribute('height',im.naturalHeight);img.setAttribute('opacity','0.85');bgLayer.appendChild(img);};im.src=data;};
      reader.readAsDataURL(f);
    }
  }catch(err){alert('読み込み失敗: '+err.message);}
});

update();draw();save();
</script>
